name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy isolated VPS project
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            PROJECT_DIR=/opt/projects/hearth-core
            if [ ! -x "$PROJECT_DIR/scripts/deploy.sh" ]; then
              echo "❌ $PROJECT_DIR/scripts/deploy.sh not found. Run the one-time migration first."
              exit 1
            fi
            bash "$PROJECT_DIR/scripts/deploy.sh"
