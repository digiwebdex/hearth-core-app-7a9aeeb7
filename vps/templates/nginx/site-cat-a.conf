# ═══════════════════════════════════════════════════════════
# Host Nginx Config — Category A (Static Frontend + API Proxy)
# Place at: /etc/nginx/sites-available/<project>.conf
# Replace: __APP_DOMAIN__, __API_DOMAIN__, __APP_PORT__, __PROJECT_NAME__, __CERT_DOMAIN__
# Certbot: certbot --nginx -d __CERT_DOMAIN__ -d __API_DOMAIN__
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name __APP_DOMAIN__ __API_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __API_DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__CERT_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_DOMAIN__/privkey.pem;

    access_log /var/log/nginx/__PROJECT_NAME__-api-access.log;
    error_log  /var/log/nginx/__PROJECT_NAME__-api-error.log;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __APP_DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__CERT_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_DOMAIN__/privkey.pem;

    root /opt/projects/__PROJECT_NAME__/frontend/dist;
    index index.html;

    access_log /var/log/nginx/__PROJECT_NAME__-frontend-access.log;
    error_log  /var/log/nginx/__PROJECT_NAME__-frontend-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/rss+xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location /uploads/ {
        alias /opt/projects/__PROJECT_NAME__/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.ico { expires 30d; access_log off; }
    location = /robots.txt  { expires 30d; access_log off; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
