# ═══════════════════════════════════════════════════════════
# Host Nginx Config — Category A (Full-stack with API)
# Place at: /etc/nginx/sites-available/<project>.conf
# Then:     ln -s ../sites-available/<project>.conf /etc/nginx/sites-enabled/
# Replace:  __DOMAIN__, __APP_PORT__, __PROJECT_NAME__
# SSL:      certbot --nginx -d __DOMAIN__ -d www.__DOMAIN__
# ═══════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;
    return 301 https://__DOMAIN__$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__ www.__DOMAIN__;

    # ─── SSL (managed by certbot) ───
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Logs ───
    access_log /var/log/nginx/__PROJECT_NAME__-access.log;
    error_log  /var/log/nginx/__PROJECT_NAME__-error.log;

    # ─── Limits ───
    client_max_body_size 50M;

    # ─── Static frontend (built dist served by app container OR direct mount) ───
    # Option A: App container serves static (recommended for SPA + API in one)
    # Option B: Nginx serves /opt/projects/__PROJECT_NAME__/frontend/dist directly
    #          root /opt/projects/__PROJECT_NAME__/frontend/dist;
    #          try_files $uri $uri/ /index.html;

    # ─── Proxy to app container ───
    location / {
        proxy_pass http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── User uploads (served directly for speed) ───
    location /uploads/ {
        alias /opt/projects/__PROJECT_NAME__/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
