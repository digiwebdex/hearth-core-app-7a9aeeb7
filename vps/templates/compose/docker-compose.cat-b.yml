# ═══════════════════════════════════════════════════════════
# Category B Template — Static Site Only (nginx-alpine)
# Usage: Copy to /opt/projects/<name>/docker-compose.yml
# ═══════════════════════════════════════════════════════════
name: ${PROJECT_NAME}

services:
  web:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT}:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  web:
    name: ${PROJECT_NAME}_web
    driver: bridge
