# ═══════════════════════════════════════════════════════════
# Category A Template — Full-stack SaaS (API + Postgres + Redis)
# Runtime folder: /opt/projects/<name>/
# Frontend is served by host Nginx from ./frontend/dist
# API runs in the app container and is proxied by host Nginx.
# ═══════════════════════════════════════════════════════════
name: ${PROJECT_NAME}

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${PROJECT_NAME}-app:latest
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://${APP_DOMAIN}
      API_BASE_URL: https://${API_DOMAIN}/api
    ports:
      - "127.0.0.1:${APP_PORT}:3000"
    volumes:
      - ./data/uploads:/app/uploads
      - ./logs/app:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=100
      -c log_min_duration_statement=500
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  internal:
    name: ${PROJECT_NAME}_internal
    driver: bridge
